name: Auto Improve

on:
  schedule:
    - cron: '0 9 */2 * *'
  workflow_dispatch:

jobs:
  improve:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - uses: actions/setup-python@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: PYTHONPATH=. pytest tests/ -v

      - name: Stamp last updated
        run: |
          DATE=$(date +%Y-%m-%d)
          echo "" >> README.md && echo "<!-- Last updated: $DATE -->" >> README.md

      - name: Commit if changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore: automated maintenance $(date +%Y-%m-%d)"

      - name: Push (with retry)
        run: |
          git pull --rebase origin main
          for i in 1 2 3; do
            git push && break
            echo "Push attempt $i failed, retrying in 10s..."
            sleep 10
          done
